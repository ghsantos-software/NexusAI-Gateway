services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexusai-postgres
    environment:
      POSTGRES_DB: nexusai
      POSTGRES_USER: nexusai
      POSTGRES_PASSWORD: nexusai
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nexusai -d nexusai" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # First run: docker exec nexusai-ollama ollama pull llama3.2:1b
  ollama:
    image: ollama/ollama:latest
    container_name: nexusai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
